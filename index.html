<!DOCTYPE html>
<html lang="en-US">
<head>

    <!-- TailwindCSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {

            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;

        h1, h2, h3, .font-serif {

        html {

        #three-canvas {

        /* Michigan Colors */

    <!-- UMD Libraries: React, ReactDOM, Three, Framer Motion, GSAP -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<body>
<div id="root" class="content-wrapper"></div>

<script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef } = React;
    const MotionLib = window.Motion || window.motion;
    const motion = MotionLib?.motion || window.motion?.motion;
    const MotionDiv = motion?.div || ((props) => <div {...props} />);
    
    // Three.js Background with floating shapes (Michigan colors vibe)
    const ThreeBackground = () => {
        const containerRef = useRef(null);
        useEffect(() => {
            if (!containerRef.current) return;
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 12);
            const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x000000, 0);
            containerRef.current.appendChild(renderer.domElement);
            
            // Torus knot with gold/yellow and blue accents
            const geometry = new THREE.TorusKnotGeometry(1.8, 0.4, 200, 32, 3, 4);
            const material = new THREE.MeshStandardMaterial({
                color: 0xF7D919,
                emissive: 0x00255A,
                roughness: 0.3,
                metalness: 0.6,
                transparent: true,
                opacity: 0.35
            });
            const knot = new THREE.Mesh(geometry, material);
            scene.add(knot);
            
            // Stars / particles
            const starGeometry = new THREE.BufferGeometry();
            const starCount = 800;
            const starPositions = new Float32Array(starCount * 3);
            for (let i = 0; i < starCount; i++) {
                starPositions[i*3] = (Math.random() - 0.5) * 200;
                starPositions[i*3+1] = (Math.random() - 0.5) * 100;
                starPositions[i*3+2] = (Math.random() - 0.5) * 60 - 30;
            }
            starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
            const starMaterial = new THREE.PointsMaterial({ color: 0xF7D919, size: 0.12, transparent: true, opacity: 0.4 });
            const stars = new THREE.Points(starGeometry, starMaterial);
            scene.add(stars);
            
            const ambientLight = new THREE.AmbientLight(0x404060);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xfff5e0, 1);
            dirLight.position.set(2, 5, 3);
            scene.add(dirLight);
            const backLight = new THREE.PointLight(0x00255A, 0.5);
            backLight.position.set(-2, 1, -4);
            scene.add(backLight);
            
            let time = 0;
            const animate = () => {
                requestAnimationFrame(animate);
                time += 0.008;
                knot.rotation.x = time * 0.5;
                knot.rotation.y = time * 0.3;
                stars.rotation.y = time * 0.05;
                stars.rotation.x = time * 0.02;
                renderer.render(scene, camera);
            };
            animate();
            
            const handleResize = () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            };
            window.addEventListener('resize', handleResize);
            return () => {
                window.removeEventListener('resize', handleResize);
                if (containerRef.current) containerRef.current.removeChild(renderer.domElement);
                renderer.dispose();
            };
        }, []);
        return <div id="three-canvas" ref={containerRef} style={{ position: 'fixed', top: 0, left: 0, width: '100%', height: '100%', zIndex: 0, pointerEvents: 'none' }}></div>;
    };
    
    // CountUp component (prefix & suffix handled correctly)
    const CountUp = ({ end, prefix = '', suffix = '', duration = 1.5 }) => {
        const [count, setCount] = useState(0);
        const ref = useRef(null);
        const hasAnimated = useRef(false);
        useEffect(() => {
            const observer = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting && !hasAnimated.current) {
                    hasAnimated.current = true;
                    let start = 0;
                    const step = Math.ceil(end / (60 * duration));
                    const timer = setInterval(() => {
                        start += step;
                        if (start >= end) {
                            setCount(end);
                            clearInterval(timer);
                        } else {
                            setCount(start);
                        }
                    }, 16);
                    return () => clearInterval(timer);
                }
            }, { threshold: 0.3 });
            if (ref.current) observer.observe(ref.current);
            return () => observer.disconnect();
        }, [end, duration]);
        return <span ref={ref}>{prefix}{count.toLocaleString()}{suffix}</span>;
    };
    
    // Main App
    const App = () => {
        useEffect(() => {
            if (window.gsap && window.ScrollTrigger) {
                window.gsap.registerPlugin(window.ScrollTrigger);
                window.gsap.utils.toArray('.fade-up').forEach((el) => {
                    window.gsap.from(el, {
                        scrollTrigger: {
                            trigger: el,
                            start: 'top 85%',
                            toggleActions: 'play none none reverse',
                        },
                        y: 40,
                        opacity: 0,
                        duration: 0.8,
                        ease: 'power2.out'
                    });
                });
            }
        }, []);
        
        // Stats array with correct prefix/suffix (no double dollar signs or double percent)

            { value: 85, prefix: '$', suffix: 'M', label: 'OF PROPERTIES SOLD' },
            { value: 142, prefix: '', suffix: '', label: 'PROPERTIES SOLD' },
            { value: 65, prefix: '$', suffix: 'M', label: 'OF PROPERTIES PURCHASED' },
            { value: 87, prefix: '', suffix: '', label: 'PROPERTIES BOUGHT' },
            { value: 112, prefix: '', suffix: '', label: 'CLOSE SALES' },
            { value: 1, prefix: '', suffix: '%', label: 'TOP 1% AGENT IN GRAND RAPIDS' },
        ];
        
        const testimonials = [
            { name: "Michael Anderson", role: "Home Buyer", text: "Louis made buying our first home in Grand Rapids seamless. His knowledge of the market and dedication is unmatched. Highly recommend LA Homes!", img: "https://assets.cdn.filesafe.space/E2BEbKIK8SvsJICq4vXY/media/69d714203dd00cb232bd1361.png" },
            { name: "Jennifer Lawson", role: "Seller", text: "Sold our house in just 10 days! Louis's marketing strategy and negotiation skills got us above asking price. Truly a professional.", img: "https://assets.cdn.filesafe.space/E2BEbKIK8SvsJICq4vXY/media/69d71420ebf1a608435354ba.png" },
            { name: "David & Emily Carter", role: "Investors", text: "Louis helped us acquire two investment properties with incredible ROI. His investor mindset and local insights are game-changing.", img: "https://assets.cdn.filesafe.space/E2BEbKIK8SvsJICq4vXY/media/69d714203dd00cb232bd1360.png" },
        ];
        
        const services = [
            { title: "I Want To Buy a Home", desc: "Find your dream home with expert negotiation and deep Grand Rapids market knowledge. Louis guides you every step of the way.", img: "https://assets.cdn.filesafe.space/E2BEbKIK8SvsJICq4vXY/media/69d71521a7dcb4cff06889ca.png", link: "#" },
            { title: "I Want To Sell My Property", desc: "Maximize your home's value with premium staging, aggressive marketing, and proven sales strategies. Sell faster and for more.", img: "https://assets.cdn.filesafe.space/E2BEbKIK8SvsJICq4vXY/media/69d71521a64a04ba1502b191.png", link: "#" },
            { title: "I Want To Invest in Real Estate", desc: "Fix & flip, rentals, or wholesale — leverage Louis's own investment experience to build your Michigan portfolio.", img: "https://assets.cdn.filesafe.space/E2BEbKIK8SvsJICq4vXY/media/69d71521a7dcb4cff06889cb.png", link: "#" }
        ];

                        <div className="flex items-center gap-3">
                            <img src="https://assets.cdn.filesafe.space/E2BEbKIK8SvsJICq4vXY/media/69d70661a64a04ba1500a204.png" alt="LA Homes Logo" className="h-10 w-auto object-contain" />
                            <span className="text-xs bg-blue-50 text-[#00255A] px-2 py-1 rounded-full font-semibold">Grand Rapids, MI</span>
                        </div>
                        <div className="hidden md:flex gap-7 text-gray-700 font-medium">
                            <a href="#home" className="hover:text-[#F7D919] transition">Home</a>
                            <a href="#stats" className="hover:text-[#F7D919] transition">Results</a>
                            <a href="#services" className="hover:text-[#F7D919] transition">Services</a>
                            <a href="#featured" className="hover:text-[#F7D919] transition">Featured</a>
                            <a href="#contact" className="hover:text-[#F7D919] transition">Contact</a>
                        </div>
                        <a href="#contact" className="bg-[#00255A] text-white px-5 py-2 rounded-full text-sm font-semibold shadow-md hover:bg-[#001a44] transition">Free Consult</a>
                    </div>
                </MotionDiv>
                
                {/* Hero Section */}
                <section id="home" className="container mx-auto px-5 md:px-10 py-10 md:py-20">
                    <div className="flex flex-col lg:flex-row items-center gap-12">
                        <MotionDiv initial={{ x: -50, opacity: 0 }} animate={{ x: 0, opacity: 1 }} transition={{ delay: 0.2, duration: 0.7 }} className="flex-1 space-y-6">
                            <div className="inline-flex bg-yellow-100 text-[#00255A] px-4 py-1.5 rounded-full text-sm font-semibold">🏆 Top 1% Real Estate Professional in Michigan 2025</div>
                            <h1 className="text-4xl md:text-5xl lg:text-6xl font-bold leading-tight text-gray-800 font-serif">Your Partner for All Real Estate Endeavors in <span className="text-gradient-michigan">Grand Rapids, Michigan</span></h1>
                            <p className="text-gray-600 text-lg leading-relaxed">Hi, I'm Louis Arnold — your dedicated local expert with over $150M+ in career sales. Whether buying, selling, or investing, I deliver unmatched service and market expertise.</p>
                            <div className="flex flex-wrap gap-5 pt-4">
                                <a href="#services" className="btn-michigan-blue text-white px-8 py-3 rounded-full font-semibold shadow-lg">BUY A HOME</a>
                                <a href="#services" className="bg-gray-800 text-white px-8 py-3 rounded-full font-semibold shadow-lg hover:bg-gray-900 transition">SELL YOUR PROPERTY</a>
                            </div>
                            <div className="flex items-center gap-3 pt-4">
                                <img src="https://assets.cdn.filesafe.space/E2BEbKIK8SvsJICq4vXY/media/69d70674a64a04ba1500a37d.png" alt="Louis Arnold" className="w-12 h-12 rounded-full object-cover border-2 border-[#F7D919]" />
                                <div>
                                    <div className="flex text-[#F7D919]">★★★★★</div>
                                    <p className="text-sm font-semibold">Louis Arnold | LA Homes</p>
                                    <p className="text-xs text-gray-500">Voted Best Real Estate Professional Grand Rapids 2024</p>
                                </div>

                        <MotionDiv initial={{ x: 50, opacity: 0 }} animate={{ x: 0, opacity: 1 }} transition={{ delay: 0.3, duration: 0.7 }} className="flex-1 flex justify-center">
                            <img src="https://assets.cdn.filesafe.space/E2BEbKIK8SvsJICq4vXY/media/69d70674a64a04ba1500a37d.png" alt="Louis Arnold Hero" className="max-w-sm md:max-w-md lg:max-w-lg rounded-2xl shadow-2xl object-contain drop-shadow-xl" />

                        </MotionDiv>

                                    </div>

                                </MotionDiv>
                            ))}
                        </div>
                    </div>
                </section>
                
                {/* About Section with Family Image */}
                <section className="container mx-auto px-5 md:px-10 py-16 flex flex-col lg:flex-row gap-12 items-center">
                    <MotionDiv initial={{ opacity: 0, x: -30 }} whileInView={{ opacity: 1, x: 0 }} transition={{ duration: 0.6 }} viewport={{ once: true }} className="flex-1">
                        <img src="https://assets.cdn.filesafe.space/E2BEbKIK8SvsJICq4vXY/media/69d7066a68c0721170b10730.png" alt="Louis with family" className="rounded-2xl shadow-xl w-full object-cover" />
                    </MotionDiv>
                    <MotionDiv initial={{ opacity: 0, x: 30 }} whileInView={{ opacity: 1, x: 0 }} transition={{ duration: 0.6 }} viewport={{ once: true }} className="flex-1 space-y-5">
                        <h2 className="text-3xl md:text-4xl font-bold font-serif text-gray-800">Integrity & Expertise — I'm Louis Arnold</h2>
                        <p className="text-gray-600 leading-relaxed">With over 12 years specializing in the Grand Rapids market, I blend local insight with innovative strategies. Whether you're a first-time buyer in East Grand Rapids or selling a luxury property in Forest Hills, my client-first approach ensures seamless transactions. I also invest personally in Michigan real estate, giving you an edge in negotiations and investment opportunities.</p>

                        </div>
                    </MotionDiv>
                </section>
                
                {/* Services Cards */}

                        </MotionDiv>

                {/* Testimonials */}

                    <div className="container mx-auto">
                        <MotionDiv whileInView={{ opacity: 1 }} initial={{ opacity: 0 }} className="text-center mb-12">
                            <h2 className="text-3xl md:text-4xl font-bold font-serif text-[#00255A]">What Clients Say</h2>
                            <p className="text-gray-500">Real experiences from Grand Rapids homeowners and investors</p>
                        </MotionDiv>
                        <div className="grid md:grid-cols-3 gap-8">
                            {testimonials.map((t, idx) => (
                                <MotionDiv key={idx} whileHover={{ scale: 1.02 }} className="bg-white p-6 rounded-xl shadow-md border border-gray-100">
                                    <div className="flex items-center gap-4 mb-4">
                                        <img src={t.img} className="w-14 h-14 rounded-full object-cover border-2 border-[#F7D919]" alt={t.name} />

                </section>
                
                {/* Featured Property */}

                                <span className="text-[#00255A] font-semibold tracking-wide bg-yellow-100 px-3 py-1 rounded-full inline-block">✨ FEATURED LISTING</span>
